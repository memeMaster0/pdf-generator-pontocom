<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e5e5e5;
      font-family: 'Segoe UI', 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 36px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      padding: 0 4px;
    }

    .titlebar-btn {
      -webkit-app-region: no-drag;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: #a3a3a3;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .titlebar-btn:hover { background: rgba(255,255,255,0.08); }
    .titlebar-btn.close:hover { background: #e81123; color: #fff; }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg { width: 36px; height: 36px; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    p {
      font-size: 14px;
      color: #737373;
      max-width: 380px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 8px;
      padding: 10px 28px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e5e5e5;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .retry-btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.2);
    }

    .retry-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      font-size: 13px;
      color: #737373;
      min-height: 20px;
    }

    .status.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="titlebar">
    <button class="titlebar-btn" id="btn-minimize" title="Minimizar">&#x2013;</button>
    <button class="titlebar-btn close" id="btn-close" title="Fechar">&#x2715;</button>
  </div>

  <div class="content">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#737373">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
      </svg>
    </div>
    <h1>Aplicativo temporariamente<br>indisponível</h1>
    <p>O acesso ao PDF Generator está suspenso no momento. Verifique sua conexão com a internet ou entre em contato com o administrador.</p>
    <button class="retry-btn" id="btn-retry">Tentar novamente</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const btnClose = document.getElementById('btn-close');
    const btnMinimize = document.getElementById('btn-minimize');
    const btnRetry = document.getElementById('btn-retry');
    const statusEl = document.getElementById('status');

    btnClose.addEventListener('click', () => {
      if (window.electronAPI) window.electronAPI.closeWindow();
    });

    btnMinimize.addEventListener('click', () => {
      if (window.electronAPI) window.electronAPI.minimizeWindow();
    });

    btnRetry.addEventListener('click', async () => {
      btnRetry.disabled = true;
      statusEl.textContent = 'Verificando...';
      statusEl.className = 'status';

      try {
        const result = await window.electronAPI.retryKillSwitch();
        if (!result.allowed) {
          statusEl.textContent = 'Acesso ainda indisponível. Tente novamente mais tarde.';
          statusEl.className = 'status error';
        }
      } catch {
        statusEl.textContent = 'Erro ao verificar. Tente novamente.';
        statusEl.className = 'status error';
      } finally {
        btnRetry.disabled = false;
      }
    });
  </script>
</body>
</html>
